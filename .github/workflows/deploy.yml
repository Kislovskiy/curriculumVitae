name: Build and Deploy CV

on:
  push:
    branches: [main, update-cv-2]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Compile LaTeX
        run: pdflatex -jobname=cv_kislovskiy cv.tex

      - uses: actions/upload-artifact@v4
        with:
          name: pdf
          path: cv_kislovskiy.pdf

  build-site:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/download-artifact@v7
        with:
          name: pdf
          path: _site

      - name: Download PDF.js
        run: |
          PDFJS_VERSION=$(curl -s https://api.github.com/repos/mozilla/pdf.js/releases/latest \
            | grep '"tag_name"' | head -1 | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -L "https://github.com/mozilla/pdf.js/releases/download/v${PDFJS_VERSION}/pdfjs-${PDFJS_VERSION}-dist.zip" \
            -o pdfjs.zip
          unzip -q pdfjs.zip -d _site/pdfjs_tmp
          mv _site/pdfjs_tmp/web _site/pdfjs

      - name: Prepare site
        run: cp index.html _site/index.html

      - uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: _site

  deploy:
    needs: build-site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
